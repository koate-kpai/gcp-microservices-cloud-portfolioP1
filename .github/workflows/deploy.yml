name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: devops-cloud-portfolio-p1-2026
  REGION: europe-west2
  GAR_LOCATION: europe-west2-docker.pkg.dev
  GAR_REPO: portfolio-repo
  CLUSTER_NAME: portfolio-gke-cluster
  CLUSTER_ZONE: europe-west2-a
  # The GitHub Actions Service Account we created earlier
  SERVICE_ACCOUNT: github-actions-sa@devops-cloud-portfolio-p1-2026.iam.gserviceaccount.com

jobs:
  build-publish-deploy:
    name: Build, Publish, and Deploy
    runs-on: ubuntu-latest
    
    # REQUIRED: These permissions allow GitHub to request the OIDC token
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Authenticate to Google Cloud using Workload Identity Federation
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: access_token
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ env.SERVICE_ACCOUNT }}

    # Configure Docker to push to Google Artifact Registry
    - name: Docker Auth
      id: docker-auth
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GAR_LOCATION }}
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    # Get GKE Cluster Credentials
    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.CLUSTER_NAME }}
        location: ${{ env.CLUSTER_ZONE }}

    # Build and Push Order Service
    - name: Build and Push Order Service
      run: |
        IMAGE_PATH="${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/order-service:${GITHUB_SHA}"
        docker build -t $IMAGE_PATH src/order-service
        docker push $IMAGE_PATH

    # Build and Push Inventory Service
    - name: Build and Push Inventory Service
      run: |
        IMAGE_PATH="${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/inventory-service:${GITHUB_SHA}"
        docker build -t $IMAGE_PATH src/inventory-service
        docker push $IMAGE_PATH

    # Inject Image Tags and Deploy to GKE
    - name: Deploy to GKE
      run: |
        # Replace the <IMAGE_TAG> placeholder with the actual Git Commit SHA
        sed -i "s/<IMAGE_TAG>/${GITHUB_SHA}/g" k8s/workloads.yaml
        
        # Apply the manifests
        kubectl apply -f k8s/workloads.yaml
        
        # Verify deployment status
        kubectl rollout status deployment/order-service --timeout=120s
        kubectl rollout status deployment/inventory-service --timeout=120s