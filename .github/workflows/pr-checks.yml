name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install inventory-service dependencies
        run: |
          pip install -r src/inventory-service/requirements.txt
          pip install pytest

      - name: Install order-service dependencies
        run: |
          pip install -r src/order-service/requirements.txt

      - name: Run ruff linting
        run: |
          pip install ruff
          ruff check src/

      - name: Run tests (inventory-service)
        run: |
          PYTHONPATH=src/inventory-service pytest src/inventory-service/tests -v

      - name: Run tests (order-service)
        run: |
          PYTHONPATH=src/order-service pytest src/order-service/tests -v

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Build order-service image
        run: docker build -t order-service:test src/order-service

      - name: Build inventory-service image
        run: docker build -t inventory-service:test src/inventory-service
