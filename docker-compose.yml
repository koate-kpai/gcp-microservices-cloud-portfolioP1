services:
  inventory-service:
    build:
      context: src/inventory-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PROJECT_NAME=Inventory Service
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  order-service:
    build:
      context: src/order-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Order Service
      - ENVIRONMENT=development
      - INVENTORY_SERVICE_URL=http://inventory-service:8001
    depends_on:
      inventory-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
